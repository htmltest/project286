<div class="window-particate">
    <div class="main-title">Акция к&nbsp;Дню защиты детей!</div>
    <form action="windows/success.html" method="post" class="window-particate-form window-form">
        <div class="window-particate-row">
            <div class="form-input"><span class="form-input-label">Фамилия<em>*</em></span><input type="text" name="lastname" value="" class="required" /></div>
            <div class="form-input"><span class="form-input-label">Имя<em>*</em></span><input type="text" name="firstname" value="" class="required" /></div>
        </div>
        <div class="window-particate-row">
            <div class="form-input"><span class="form-input-label">Номер телефона<em>*</em></span><input type="text" name="phone" value="" class="phoneRU required" /></div>
            <div class="form-input"><span class="form-input-label">Е-mail</span><input type="text" name="name" value="" class="email" /></div>
        </div>
        <div class="window-particate-polis">
            <div class="window-particate-polis-title">Данные полиса &laquo;На&nbsp;всякий случай!&raquo;</div>
            <div class="form-input"><span class="form-input-label">Серия и Номер полиса<em>*</em></span><input type="text" name="polis" value="" class="required" /><div class="form-input-hint">Например: ЦО-П012-1234567/12345</div></div>
        </div>
        <div class="form-required-notice"><span>*</span> Обязательные для заполнения поля</div>
        <div class="window-particate-ctrl">
            <div class="form-checkbox">
                <label><input type="checkbox" name="confirm" class="required" /><span>Я&nbsp;даю свое согласие на&nbsp;обработку моих перснальных данных, в&nbsp;соответствии с&nbsp;Федеральным законом &#8470;&nbsp;152-Ф3 &laquo;О&nbsp;персональных данных&raquo;, на&nbsp;условиях и&nbsp;целях, определенных в&nbsp;<a href="#">политике конфеденциальности</a>.</span></label>
            </div>
            <div class="form-submit"><input type="submit" value="Отправить" class="btn" /></div>
        </div>
    </form>
</div>
